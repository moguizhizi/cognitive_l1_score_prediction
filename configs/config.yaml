
xlsx_to_parquet:
  raw_files:

    - xlsx: data/external/raw/brain_ability_values_by_training_week_20260324/brain_ability_values_by_training_week_20260324.xlsx
      parquet: data/internal/raw/brain_ability_values_by_training_week_20260324

# ==============================
# CSV 列名映射文件
# ==============================
column_mapping:

  brain_ability_values_by_training_week_20260324: src/core/brain_ability_values_by_training_week_20260324/column_mapping.json


# ==============================
# CSV 字段名称定义
# key: 文件名（不含后缀）
# value: 字段名列表
# ==============================
columns:

  brain_ability_values_by_training_week_20260324:
    - 医院id
    - 医院
    - 患者姓名
    - 患者编码
    - 性别
    - 出生日期
    - 疾病标签
    - 科室
    - 首次测评脑能力均值(任务40-160均值)
    - 首个应训练日日期
    - 训练周数
    - 该周达标天数
    - 感知觉
    - 注意力
    - 记忆力
    - 执行功能

raw_to_processed:

  brain_ability_values_by_training_week_20260324:

    raw: data/internal/raw/brain_ability_values_by_training_week_20260324
    processed: data/internal/processed/brain_ability_values_by_training_week_20260324

processed_to_splitter:

  brain_ability_values_by_training_week_20260324:

    processed: data/internal/processed/brain_ability_values_by_training_week_20260324
    splitter: data/internal/splitter/brain_ability_values_by_training_week_20260324
    valid_patient_min_weeks: 5
    recent_valid_weeks: 24

eda:
  dataset_key: brain_ability_values_by_training_week_20260324
  output_dir: experiments/eda/brain_ability_values_by_training_week_20260324
  training_week_thresholds:
    - 3
    - 5
    - 8
    - 10
    - 24
  cognitive_score_columns:
    - PERCEPTION
    - ATTENTION
    - MEMORY
    - EXECUTIVE_FUNCTION
  enabled_reports:
    - dataset_overview
    - patient_statistics
    - training_week_statistics
    - cognitive_score_statistics
    - missing_values

# ==============================
# 以下原为 train.yaml 内容
# ==============================
train:
  dataset_key: brain_ability_values_by_training_week_20260324
  split_dir: data/internal/splitter/brain_ability_values_by_training_week_20260324
  checkpoint_dir: checkpoints/cognitive_l1
  experiment_dir: experiments/train/cognitive_l1
  feature_columns_filename: feature_columns.json
  model_name: lightgbm

  training_data_params:
    min_history_len: 3
    max_history_len: 12
    noise_prob: 0.0
    noise_std: 0.0
    target_horizon_weeks: 12

  model_params:
    n_estimators: 500
    learning_rate: 0.03
    max_depth: -1           # 不限制深度
    num_leaves: 31
    min_child_samples: 20  # 叶子节点最小样本数
    reg_alpha: 0.1
    reg_lambda: 0.5
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42

  target_overrides:
    executive_function:
      model_params:
        n_estimators: 300
        learning_rate: 0.05
        num_leaves: 15
        min_child_samples: 40
        reg_alpha: 0.2
        reg_lambda: 1.0
      training_data_params:
        target_horizon_weeks: 12
